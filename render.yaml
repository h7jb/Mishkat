services:
  - type: web
    name: azkar-quran-bot
    env: node
    plan: free
    buildCommand: npm install --build-from-source=sqlite3
    startCommand: npm start
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: PORT
        value: 3000
      - key: NODE_VERSION
        value: 20.18.0
